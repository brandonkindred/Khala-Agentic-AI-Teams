# Density + per-count mass table keyed by canonical_id.
#
# volume_to_mass: grams per one ml (for volume-purchase items).
# count_to_mass: grams per one count unit (for items sold by number).
# default_qty_grams: "no quantity specified" fallback ("a handful of
#   cashews" → 30 g); only set for ingredients whose typical amount
#   is meaningful.
#
# SPEC-005 §4.8. Every value has a citation in a trailing comment or
# is measured via USDA FDC reference weights. Changing a value is a
# minor KB_VERSION bump.

# --- Oils + fats (volume purchase) ---------------------------------
olive_oil:        { volume_to_mass: 0.913 }   # USDA FDC 171413
butter:           { count_to_mass: 113.0, default_qty_grams: null } # 1 stick
ghee:             { volume_to_mass: 0.911 }
sesame_oil:       { volume_to_mass: 0.921 }

