<app-dashboard-shell
  title="StudioGrid"
  subtitle="Design-system multi-agent workflow — wireframes, design system, hi-fi, and handoff"
  icon="design_services"
  [healthCheck]="healthCheck"
  healthLabel="StudioGrid API"
>
<mat-tab-group animationDuration="200ms" class="studio-tabs">
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">rocket_launch</mat-icon>
      Design Runs
    </ng-template>
    <div class="tab-content">
      <app-studio-grid-run-panel />
    </div>
  </mat-tab>

</mat-tab-group>
</app-dashboard-shell>
