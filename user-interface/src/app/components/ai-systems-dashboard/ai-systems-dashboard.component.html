<app-dashboard-shell
  title="AI Systems"
  subtitle="Spec-driven AI agent system factory"
  icon="psychology"
  [healthCheck]="healthCheck"
  healthLabel="AI Systems API"
>
  <app-team-assistant-chat
    [teamApiUrl]="'/api/ai-systems/assistant'"
    [teamName]="'AI Systems'"
    [teamDescription]="'Build an AI agent system from a specification'"
    [fields]="[
      {key: 'project_name', label: 'Project name', placeholder: 'Name of the AI system', required: true},
      {key: 'spec_path', label: 'Spec file path', placeholder: 'Path to system specification', required: true},
      {key: 'constraints', label: 'Constraints', placeholder: 'Performance, cost, or latency requirements'}
    ]"
  />
</app-dashboard-shell>
