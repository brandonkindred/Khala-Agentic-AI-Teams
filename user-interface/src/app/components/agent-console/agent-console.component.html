<mat-tab-group
  class="agent-console"
  animationDuration="120ms"
  mat-stretch-tabs="false"
  mat-align-tabs="start"
>
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon>apps</mat-icon>
      <span class="tab-label">Catalog</span>
    </ng-template>
    <div class="agent-console__tab-content agent-console__catalog-tab">
      <header class="agent-console__header">
        <div>
          <h1>Agent Console</h1>
          <p>
            Browse every specialist agent in the system, open their anatomy, and
            run them in isolated sandboxes.
          </p>
        </div>
      </header>
      <app-agent-catalog (requestRun)="onRunAgent($event)"></app-agent-catalog>
    </div>
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon>play_circle</mat-icon>
      <span class="tab-label">Runner</span>
    </ng-template>
    <div class="agent-console__tab-content">
      <app-agent-runner
        [preselectedAgentId]="preselectedAgentId()"
        (requestCatalogReturn)="onReturnToCatalog()"
      ></app-agent-runner>
    </div>
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon>cloud_queue</mat-icon>
      <span class="tab-label">Provisioning &amp; Environments</span>
    </ng-template>
    <div class="agent-console__tab-content">
      <app-agent-provisioning-dashboard></app-agent-provisioning-dashboard>
    </div>
  </mat-tab>
</mat-tab-group>
